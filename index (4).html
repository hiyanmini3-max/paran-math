<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파란수학 고등관 인원 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0A2342;--navy2:#1B4F8A;--blue:#2E86DE;--gold:#C9A84C;--gold-l:#F0D080;--bg:#EEF2F7;--card:#FFFFFF;--border:rgba(10,35,66,0.09);--muted:#6B7E96;--light:#A0B0C0;--r:12px;--r-s:7px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;}
.hd{background:var(--navy);border-bottom:2px solid var(--gold);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.hd-l{display:flex;align-items:center;gap:12px;}
.badge{background:var(--gold);color:var(--navy);font-weight:700;font-size:12px;padding:3px 9px;border-radius:4px;}
.hd h1{color:#fff;font-size:16px;font-weight:500;}
.hd-r{display:flex;align-items:center;gap:10px;}
.sync{color:var(--gold-l);font-size:11px;font-family:'DM Mono',monospace;}
.btn-save{background:transparent;border:1px solid rgba(201,168,76,0.5);color:var(--gold-l);font-size:12px;padding:4px 12px;border-radius:5px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-save:hover{background:rgba(201,168,76,0.15);}
.summary{background:var(--navy2);display:flex;gap:0;overflow-x:auto;padding:0 20px;}
.si{padding:11px 24px;border-right:1px solid rgba(255,255,255,0.1);min-width:100px;}
.si:last-child{border:none;}
.si-label{font-size:10px;color:rgba(255,255,255,0.55);margin-bottom:3px;letter-spacing:.05em;}
.si-val{font-size:20px;font-weight:700;color:#fff;font-family:'DM Mono',monospace;}
.si-val span{font-size:11px;font-weight:400;color:var(--gold-l);margin-left:3px;}
.tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;}
.tab{padding:9px 20px;font-size:13px;font-weight:500;background:none;border:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:16px 20px;}
.tc{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;}
.tc-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tc-name{font-size:15px;font-weight:700;color:var(--navy);}
.tc-days{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.tc-total-num{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--navy);text-align:right;}
.tc-total-label{font-size:10px;color:var(--muted);text-align:right;}
.slots{padding:10px 14px;display:flex;flex-direction:column;gap:7px;}
.slot{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r-s);background:var(--bg);cursor:pointer;transition:background .15s;border:1px solid transparent;}
.slot:hover{background:#E4EBF5;border-color:var(--border);}
.slot.open{background:#EAF1FB;border-color:rgba(46,134,222,0.2);}
.slot-part{font-size:11px;font-weight:500;color:var(--muted);width:72px;flex-shrink:0;line-height:1.3;}
.gtag{font-size:10px;font-weight:500;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.g1{background:#E3EEFF;color:#1B4F8A;}
.g2{background:#E3F5EC;color:#1A7F4B;}
.g3{background:#FFF0E0;color:#B7600E;}
.ga{background:#F0ECFF;color:#5B45A8;}
.slot-bar{flex:1;height:7px;background:rgba(10,35,66,0.08);border-radius:4px;overflow:hidden;}
.slot-fill{height:100%;border-radius:4px;transition:width .3s;}
.fill-full{background:#E24B4A;}
.fill-near{background:#EF9F27;}
.fill-ok{background:#1D9E75;}
.fill-na{background:#9BAAB8;}
.slot-nums{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;color:var(--navy);white-space:nowrap;min-width:48px;text-align:right;}
.slot-badge{font-size:10px;font-weight:500;padding:2px 6px;border-radius:10px;white-space:nowrap;min-width:44px;text-align:center;}
.b-full{background:#FEE;color:#C0392B;}
.b-near{background:#FFF5E0;color:#B7791F;}
.b-ok{background:#E8F8F0;color:#1A7F4B;}
.b-na{background:#F0EEF8;color:#6B5FA6;}
.slot-arrow{font-size:10px;color:var(--light);transition:transform .2s;flex-shrink:0;}
.slot.open .slot-arrow{transform:rotate(90deg);}
.stu-panel{display:none;padding:8px 14px 12px;border-top:1px solid var(--border);background:#F7FAFF;}
.stu-panel.open{display:block;}
.stu-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 8px;font-size:11px;color:var(--navy);display:flex;align-items:center;gap:3px;}
.chip-del{color:var(--light);cursor:pointer;font-size:13px;line-height:1;}
.chip-del:hover{color:#E24B4A;}
.stu-add{display:flex;gap:6px;margin-top:6px;}
.stu-add input{flex:1;padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;background:var(--card);}
.stu-add input:focus{border-color:var(--blue);}
.stu-add button{padding:5px 12px;background:var(--blue);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;}
.stu-label{font-size:11px;color:var(--muted);margin-bottom:5px;}
.group-label{padding:14px 20px 2px;font-size:12px;font-weight:700;color:var(--navy2);letter-spacing:.05em;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:9px 16px;border-radius:8px;font-size:12px;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:99;}
.toast.show{opacity:1;transform:translateY(0);}
.legend{display:flex;flex-wrap:wrap;gap:14px;padding:4px 20px 16px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.leg-dot{width:8px;height:8px;border-radius:2px;}
@media(max-width:600px){.grid{grid-template-columns:1fr;padding:12px;}.si{padding:10px 14px;}}
</style>
</head>
<body>
<div class="hd">

let D=JSON.parse(JSON.stringify(INIT));
let tab='all';
let openSet=new Set();

async function load(){
  try{const r=await window.storage.get('paran_v5');if(r&&r.value)D=JSON.parse(r.value);}catch(e){}
  render();
}

async function saveData(){
  D.lastUpdated=new Date().toISOString();
  try{await window.storage.set('paran_v5',JSON.stringify(D));toast('저장되었습니다');syncTime();}
  catch(e){toast('저장 실패');}
}

function syncTime(){
  const d=new Date(D.lastUpdated);
  document.getElementById('syncTime').textContent=`저장: ${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function bi(n,max){
  if(!max)return{fc:'fill-na',bc:'b-na',bt:'개별'};
  const r=max-n;
  if(r<=0)return{fc:'fill-full',bc:'b-full',bt:'마감'};
  if(r<=1)return{fc:'fill-full',bc:'b-full',bt:`+${r}명`};
  if(r<=3)return{fc:'fill-near',bc:'b-near',bt:`+${r}명`};
  return{fc:'fill-ok',bc:'b-ok',bt:`+${r}명`};
}

function slotHTML(s){
  const n=s.stu.length;
  const pct=s.max?Math.min(100,Math.round(n/s.max*100)):60;
  const{fc,bc,bt}=bi(n,s.max);
  const maxTxt=s.max?`/${s.max}`:'';
  const gmap={고1:'g1',고2:'g2',고3:'g3',개별:'ga'};
  const isOpen=openSet.has(s.id);
  const chips=s.stu.map((st,i)=>`<div class="chip">${st}<span class="chip-del" onclick="event.stopPropagation();delStu('${s.id}',${i})">×</span></div>`).join('');
  return`<div class="slot${isOpen?' open':''}" onclick="toggleSlot('${s.id}')">
    <span class="slot-part">${s.part}</span>
    <span class="gtag ${gmap[s.grade]||'ga'}">${s.grade}</span>
    <div class="slot-bar"><div class="slot-fill ${fc}" style="width:${pct}%"></div></div>
    <span class="slot-nums">${n}${maxTxt}</span>
    <span class="slot-badge ${bc}">${bt}</span>
    <span class="slot-arrow">▶</span>
  </div>
  <div class="stu-panel${isOpen?' open':''}" id="sp_${s.id}">
    <div class="stu-label">${s.part} 학생 (${n}명)</div>
    <div class="stu-chips">${chips}</div>
    <div class="stu-add">
      <input id="si_${s.id}" placeholder="이름(학교학년) 입력 후 Enter" onkeydown="if(event.key==='Enter')addStu('${s.id}')">
      <button onclick="addStu('${s.id}')">추가</button>
    </div>
  </div>`;
}

function tcHTML(t,groups){
  const slots=t.slots.filter(s=>groups.includes(s.g));
  if(!slots.length)return'';
  const total=slots.reduce((a,s)=>a+s.stu.length,0);
  const maxTotal=slots.reduce((a,s)=>s.max?a+s.max:a,0);
  return`<div class="tc">
    <div class="tc-head">
      <div><div class="tc-name">${t.name}</div><div class="tc-days">${t.days}</div></div>
      <div><div class="tc-total-num">${total}<span style="font-size:13px;color:var(--muted);font-weight:400">명</span></div>
      <div class="tc-total-label">${maxTotal?`최대 ${maxTotal}명`:'고3·개별'}</div></div>
    </div>
    <div class="slots">${slots.map(s=>slotHTML(s)).join('')}</div>
  </div>`;
}

function render(){
  syncTime();renderSummary();
  const labels={mwf:'월수금반',tts:'화목토반',wknd:'주말반'};
  let html='';
  if(tab==='all'){
    const cards=D.teachers.map(t=>tcHTML(t,['mwf','tts','wknd'])).filter(Boolean).join('');
    html=`<div class="grid">${cards}</div>`;
  }else{
    const groups=tab==='mwf'?['mwf']:tab==='tts'?['tts']:['wknd'];
    const cards=D.teachers.map(t=>tcHTML(t,groups)).filter(Boolean).join('');
    html=`<div class="group-label">${labels[tab]}</div><div class="grid">${cards}</div>`;
  }
  document.getElementById('root').innerHTML=html;
}

function renderSummary(){
  let add=0;
  D.teachers.forEach(t=>t.slots.forEach(s=>{
    if(s.max)add+=Math.max(0,s.max-s.stu.length);
  }));
  document.getElementById('summary').innerHTML=`
    <div class="si"><div class="si-label">전체 수강 (5/12)</div><div class="si-val">276<span>명</span></div></div>
    <div class="si"><div class="si-label">1학년</div><div class="si-val">122<span>명</span></div></div>
    <div class="si"><div class="si-label">2학년</div><div class="si-val">54<span>명</span></div></div>
    <div class="si"><div class="si-label">3학년</div><div class="si-val">47<span>명</span></div></div>
    <div class="si"><div class="si-label">인창현·이해빈T</div><div class="si-val">53<span>명</span></div></div>
    <div class="si"><div class="si-label">추가 가능</div><div class="si-val">${add}<span>명</span></div></div>`;
}

function setTab(t,el){
  tab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));el.classList.add('on');render();
}

function toggleSlot(id){
  if(openSet.has(id))openSet.delete(id);else openSet.add(id);
  const slot=document.querySelector(`.slot[onclick="toggleSlot('${id}')"]`);
  const panel=document.getElementById(`sp_${id}`);
  if(slot)slot.classList.toggle('open',openSet.has(id));
  if(panel)panel.classList.toggle('open',openSet.has(id));
}

function findSlot(id){for(const t of D.teachers){const s=t.slots.find(s=>s.id===id);if(s)return s;}}

function delStu(slotId,idx){
  const s=findSlot(slotId);if(!s)return;
  s.stu.splice(idx,1);saveData();openSet.add(slotId);render();
}

function addStu(slotId){
  const inp=document.getElementById(`si_${slotId}`);
  if(!inp||!inp.value.trim())return;
  const s=findSlot(slotId);if(!s)return;
  s.stu.push(inp.value.trim());saveData();openSet.add(slotId);render();
  setTimeout(()=>{const i=document.getElementById(`si_${slotId}`);if(i)i.focus();},50);
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

load();
</script>
