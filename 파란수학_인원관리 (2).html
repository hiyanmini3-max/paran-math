<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파란수학 고등관 — 인원 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --blue-deep: #0A2342;
  --blue-mid: #1B4F8A;
  --blue-bright: #2E86DE;
  --gold: #C9A84C;
  --gold-light: #F0D080;
  --bg: #F4F6F9;
  --surface: #FFFFFF;
  --surface2: #F0F4FA;
  --text: #0A2342;
  --text-muted: #5A6B82;
  --text-light: #9BAAB8;
  --border: rgba(10,35,66,0.10);
  --red-bg: #FFF0F0; --red: #C0392B;
  --amber-bg: #FFF8E8; --amber: #B7791F;
  --green-bg: #EEF9F3; --green: #1A7F4B;
  --gray-bg: #F1EFF7; --gray-c: #6B5FA6;
  --radius: 12px;
  --radius-sm: 7px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header {
  background: var(--blue-deep);
  padding: 0 2rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
  border-bottom: 2px solid var(--gold);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo-badge {
  background: var(--gold);
  color: var(--blue-deep);
  font-weight: 700; font-size: 13px;
  padding: 4px 10px; border-radius: 4px;
  letter-spacing: 0.03em;
}
.header h1 { color: #fff; font-size: 17px; font-weight: 500; }
.header-right { display: flex; align-items: center; gap: 12px; }
.sync-time { color: var(--gold-light); font-size: 12px; font-family: 'DM Mono', monospace; }
.btn-sync {
  background: transparent; border: 1px solid rgba(201,168,76,0.5);
  color: var(--gold-light); font-size: 12px; padding: 5px 12px;
  border-radius: 5px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
}
.btn-sync:hover { background: rgba(201,168,76,0.15); }

/* SUMMARY STRIP */
.summary-strip {
  background: var(--blue-mid);
  padding: 0 2rem;
  display: flex; gap: 0; overflow-x: auto;
}
.sum-item {
  padding: 14px 28px; border-right: 1px solid rgba(255,255,255,0.1);
  min-width: 120px;
}
.sum-item:last-child { border-right: none; }
.sum-label { font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 4px; letter-spacing: 0.05em; }
.sum-val { font-size: 22px; font-weight: 700; color: #fff; font-family: 'DM Mono', monospace; }
.sum-val span { font-size: 12px; font-weight: 400; color: var(--gold-light); margin-left: 4px; }

/* TABS */
.tabs { display: flex; gap: 0; padding: 1.5rem 2rem 0; border-bottom: 1px solid var(--border); background: var(--surface); }
.tab-btn {
  padding: 10px 24px; font-size: 14px; font-weight: 500;
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); border-bottom: 3px solid transparent;
  transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif;
  margin-bottom: -1px;
}
.tab-btn.active { color: var(--blue-bright); border-bottom-color: var(--blue-bright); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* MAIN */
.main { padding: 1.5rem 2rem; max-width: 1200px; }

/* TABLE */
.table-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.table-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.table-title { font-size: 14px; font-weight: 700; color: var(--blue-deep); display: flex; align-items: center; gap: 8px; }
.table-sub { font-size: 12px; color: var(--text-muted); font-weight: 400; }
.edit-hint { font-size: 11px; color: var(--text-light); }

table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--surface2); }
th {
  padding: 10px 14px; font-size: 12px; font-weight: 500;
  color: var(--text-muted); text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
th:first-child { text-align: left; width: 100px; }
td {
  padding: 0; text-align: center;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
td:first-child { text-align: left; padding: 0 14px; }
tr:last-child td { border-bottom: none; }
tr:hover { background: #F8FAFD; }

/* CELL */
.cell-wrap { padding: 10px 14px; }
.grade-tag {
  display: inline-block; font-size: 10px; font-weight: 500;
  padding: 1px 6px; border-radius: 3px; margin-bottom: 4px;
}
.g1 { background: #E8F0FF; color: #1B4F8A; }
.g2 { background: #E8F7F0; color: #1A7F4B; }
.g3 { background: #FFF3E0; color: #B7600E; }
.ga { background: #F3EFFF; color: #5B45A8; }

.num-row { display: flex; align-items: center; justify-content: center; gap: 6px; }
.cur-num {
  font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace;
  color: var(--blue-deep);
  cursor: pointer; padding: 2px 6px; border-radius: 4px;
  transition: background 0.15s;
}
.cur-num:hover { background: #EEF4FF; }
.cur-num.editing {
  background: #EEF4FF; outline: 2px solid var(--blue-bright);
}
.max-txt { font-size: 11px; color: var(--text-light); }

.badge {
  display: inline-block; font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 10px; margin-top: 3px;
}
.badge-full { background: var(--red-bg); color: var(--red); }
.badge-near { background: var(--amber-bg); color: var(--amber); }
.badge-ok { background: var(--green-bg); color: var(--green); }
.badge-na { background: var(--gray-bg); color: var(--gray-c); }

.teacher-name { font-size: 14px; font-weight: 500; color: var(--blue-deep); }
.teacher-days { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

.total-cell { font-size: 15px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--blue-deep); }
.total-max { font-size: 11px; color: var(--text-muted); }

/* EDIT INPUT */
.inline-input {
  width: 50px; text-align: center; font-size: 16px; font-weight: 700;
  font-family: 'DM Mono', monospace; border: none; background: transparent;
  outline: none; color: var(--blue-deep);
}

/* STUDENT PANEL */
.student-panel {
  display: none;
  background: #F8FAFD; border-top: 1px solid var(--border);
}
.student-panel.open { display: block; }
.student-inner { padding: 12px 20px; }
.student-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.s-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 10px; font-size: 12px;
  color: var(--text); display: flex; align-items: center; gap: 4px;
}
.s-chip .del-s {
  color: var(--text-light); cursor: pointer; font-size: 14px;
  line-height: 1; padding: 0 2px;
}
.s-chip .del-s:hover { color: var(--red); }
.add-student-row { display: flex; gap: 8px; margin-top: 10px; }
.add-student-row input {
  flex: 1; padding: 6px 10px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
  outline: none;
}
.add-student-row input:focus { border-color: var(--blue-bright); }
.btn-add-s {
  padding: 6px 14px; background: var(--blue-bright); color: #fff;
  border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
}
.panel-label { font-size: 12px; font-weight: 500; color: var(--text-muted); }

/* LEGEND */
.legend { display: flex; gap: 16px; padding: 1rem 0 0; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
.leg-dot { width: 8px; height: 8px; border-radius: 2px; }

/* NOTE */
.note-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 20px;
  margin-bottom: 1.5rem;
}
.note-box p { font-size: 12px; color: var(--text-muted); line-height: 1.8; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,35,66,0.4); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius);
  padding: 24px; width: 340px; max-width: 90vw;
}
.modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--blue-deep); }
.modal-msg { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.7; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
.btn-cancel { padding: 8px 16px; border: 1px solid var(--border); border-radius: 6px; background: none; cursor: pointer; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; }
.btn-confirm { padding: 8px 16px; background: var(--blue-bright); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--blue-deep); color: #fff;
  padding: 10px 18px; border-radius: 8px; font-size: 13px;
  opacity: 0; transform: translateY(10px);
  transition: all 0.3s; pointer-events: none; z-index: 200;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* RESPONSIVE */
@media (max-width: 768px) {
  .main { padding: 1rem; }
  .header { padding: 0 1rem; }
  .summary-strip { padding: 0 1rem; }
  .tabs { padding: 1rem 1rem 0; }
  th, td { padding: 8px; font-size: 12px; }
  .sum-item { padding: 12px 16px; }
}
</style>
</head>

<div class="toast" id="toast"></div>

let data = JSON.parse(JSON.stringify(DEFAULT_DATA));
let currentTab = 'all';
let openPanels = new Set();

async function loadData() {
  try {
    const r = await window.storage.get('paran_enrollment_v2');
    if (r && r.value) {
      data = JSON.parse(r.value);
    }
  } catch(e) {}
  render();
}

async function saveData() {
  data.lastUpdated = new Date().toISOString();
  try {
    await window.storage.set('paran_enrollment_v2', JSON.stringify(data));
    showToast('저장되었습니다');
    updateSyncTime();
  } catch(e) {
    showToast('저장 실패: ' + e.message);
  }
}

function updateSyncTime() {
  const d = new Date(data.lastUpdated);
  document.getElementById('syncTime').textContent =
    `최종 저장: ${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function badgeInfo(n, max) {
  if (!max) return { cls:'badge-na', txt:'개별', remain: null };
  const r = max - n;
  if (r <= 0) return { cls:'badge-full', txt:'마감', remain: 0 };
  if (r <= 1) return { cls:'badge-full', txt:`+${r}명`, remain: r };
  if (r <= 3) return { cls:'badge-near', txt:`+${r}명`, remain: r };
  return { cls:'badge-ok', txt:`+${r}명`, remain: r };
}

function gradeTag(g) {
  const map = { '고1':'g1', '고2':'g2', '고3':'g3', '개별':'ga' };
  return `<span class="grade-tag ${map[g]||'ga'}">${g}</span>`;
}

function slotCell(slot) {
  const n = slot.students.length;
  const bi = badgeInfo(n, slot.max);
  const maxTxt = slot.max ? `/ ${slot.max}` : '';
  return `
    <td>
      <div class="cell-wrap">
        ${gradeTag(slot.grade)}
        <div class="num-row">
          <span class="cur-num" onclick="togglePanel('${slot.id}')"
            title="클릭하여 학생 명단 보기">${n}</span>
          <span class="max-txt">${maxTxt}</span>
        </div>
        <div><span class="badge ${bi.cls}">${bi.txt}</span></div>
      </div>
    </td>`;
}

function emptyCell() {
  return `<td><span style="color:var(--color-text-tertiary);font-size:13px">—</span></td>`;
}

function totalCell(slots, group) {
  const filtered = slots.filter(s => s.group === group);
  if (filtered.length === 0) return emptyCell();
  const n = filtered.reduce((a,s)=>a+s.students.length,0);
  const maxSum = filtered.reduce((a,s)=>s.max?a+s.max:a, 0);
  const hasMax = filtered.some(s=>s.max);
  return `<td>
    <div class="cell-wrap">
      <div class="total-cell">${n}명</div>
      ${hasMax ? `<div class="total-max">최대 ${maxSum}명</div>` : ''}
    </div>
  </td>`;
}

function studentPanel(slot) {
  const isOpen = openPanels.has(slot.id);
  return `
    <tr class="student-panel ${isOpen?'open':''}" id="panel_${slot.id}">
      <td colspan="10">
        <div class="student-inner">
          <div class="panel-label">${slot.part} 학생 명단 (${slot.students.length}명)</div>
          <div class="student-list" id="slist_${slot.id}">
            ${slot.students.map((s,i)=>`
              <div class="s-chip" id="chip_${slot.id}_${i}">
                ${s}
                <span class="del-s" onclick="removeStudent('${slot.id}',${i})" title="삭제">×</span>
              </div>`).join('')}
          </div>
          <div class="add-student-row">
            <input type="text" id="newstu_${slot.id}" placeholder="이름(학교학년) 입력 후 Enter"
              onkeydown="if(event.key==='Enter') addStudent('${slot.id}')">
            <button class="btn-add-s" onclick="addStudent('${slot.id}')">추가</button>
          </div>
        </div>
      </td>
    </tr>`;
}

function renderTable(teachers, groups) {
  const groupLabel = { mwf:'월수금', tts:'화목토', wknd:'주말' };
  const parts = ['1부','2부'];

  let html = '';
  teachers.forEach(t => {
    const relevantSlots = t.slots.filter(s => groups.includes(s.group));
    if (relevantSlots.length === 0) return;

    html += `<tbody>`;

    // main row
    let mainRow = `<tr>
      <td style="padding:12px 14px">
        <div class="teacher-name">${t.name}</div>
        <div class="teacher-days">`;
    ['mwf','tts','wknd'].forEach(g=>{
      if (groups.includes(g) && t.days[g]) mainRow += `${groupLabel[g]}: ${t.days[g]}<br>`;
    });
    mainRow += `</div></td>`;

    // slots by group and part
    groups.forEach(g => {
      ['1부','2부'].forEach(p => {
        const slot = t.slots.find(s=>s.group===g && s.part===p);
        if (slot) mainRow += slotCell(slot);
        else if (t.slots.some(s=>s.group===g)) mainRow += emptyCell();
      });
      mainRow += totalCell(t.slots, g);
    });

    mainRow += `</tr>`;
    html += mainRow;

    // student panels per slot
    relevantSlots.forEach(slot => {
      html += studentPanel(slot);
    });

    html += `</tbody>`;
  });
  return html;
}

function buildTableCard(title, groups, teachers) {
  const groupLabel = { mwf:'월수금', tts:'화목토', wknd:'주말' };
  const relevantTeachers = teachers.filter(t => t.slots.some(s=>groups.includes(s.group)));
  if (relevantTeachers.length === 0) return '';

  let headers = '<th>담임</th>';
  groups.forEach(g => {
    headers += `<th colspan="2">${groupLabel[g]}</th><th>${groupLabel[g]} 합계</th>`;
  });

  // sub-header
  let subHeaders = '<th></th>';
  groups.forEach(g => {
    subHeaders += `<th>1부</th><th>2부</th><th></th>`;
  });

  return `
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">${title} <span class="table-sub">클릭하여 학생 명단 확인·수정</span></div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>${headers}</tr>
            <tr style="background:var(--bg)">${subHeaders}</tr>
          </thead>
          ${renderTable(relevantTeachers, groups)}
        </table>
      </div>
    </div>`;
}

function render() {
  updateSyncTime();
  updateSummary();

  const main = document.getElementById('mainContent');
  const { teachers } = data;

  let html = '';

  if (currentTab === 'all' || currentTab === 'mwf') {
    html += buildTableCard('월수금반 인원 현황', ['mwf'], teachers);
  }
  if (currentTab === 'all' || currentTab === 'tts') {
    html += buildTableCard('화목토반 인원 현황', ['tts'], teachers);
  }
  if (currentTab === 'all' || currentTab === 'wknd') {
    html += buildTableCard('주말반 인원 현황', ['wknd'], teachers);
  }

  html += `<div class="note-box"><p>
    * 고1 한 타임 최대 10명, 고2 한 타임 최대 12명 기준 (고3·개별 상한 없음)<br>
    * 이영주T 수금일 운영 (타 선생님과 요일 다름)<br>
    * 인원 클릭 시 학생 명단 펼치기·수정 가능 / 저장 버튼으로 변경사항 저장
  </p></div>`;

  main.innerHTML = html;
}

function updateSummary() {
  const { teachers } = data;
  let total = 0, g1 = 0, g2 = 0, g3 = 0, addable = 0;
  const counted = new Set();
  teachers.forEach(t => {
    t.slots.forEach(s => {
      s.students.forEach(st => {
        const key = `${t.id}_${s.id}_${st}`;
        if (!counted.has(key)) { counted.add(key); total++; }
      });
      if (s.grade==='고1') g1 += s.students.length;
      else if (s.grade==='고2') g2 += s.students.length;
      else if (s.grade==='고3') g3 += s.students.length;
      if (s.max) addable += Math.max(0, s.max - s.students.length);
    });
  });

  document.getElementById('summaryStrip').innerHTML = `
    <div class="sum-item"><div class="sum-label">전체 수강인원</div><div class="sum-val">${total}<span>명</span></div></div>
    <div class="sum-item"><div class="sum-label">고1</div><div class="sum-val">${g1}<span>명</span></div></div>
    <div class="sum-item"><div class="sum-label">고2</div><div class="sum-val">${g2}<span>명</span></div></div>
    <div class="sum-item"><div class="sum-label">고3·개별</div><div class="sum-val">${g3}<span>명</span></div></div>
    <div class="sum-item"><div class="sum-label">추가 가능 (고1·2)</div><div class="sum-val">${addable}<span>명</span></div></div>
  `;
}

function togglePanel(slotId) {
  if (openPanels.has(slotId)) {
    openPanels.delete(slotId);
  } else {
    openPanels.add(slotId);
  }
  const panel = document.getElementById(`panel_${slotId}`);
  if (panel) panel.classList.toggle('open', openPanels.has(slotId));
}

function findSlot(slotId) {
  for (const t of data.teachers) {
    const s = t.slots.find(s=>s.id===slotId);
    if (s) return s;
  }
  return null;
}

function removeStudent(slotId, idx) {
  const slot = findSlot(slotId);
  if (!slot) return;
  const name = slot.students[idx];
  slot.students.splice(idx, 1);
  saveData();
  render();
  openPanels.add(slotId);
  setTimeout(() => {
    const panel = document.getElementById(`panel_${slotId}`);
    if (panel) panel.classList.add('open');
  }, 50);
}

function addStudent(slotId) {
  const input = document.getElementById(`newstu_${slotId}`);
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  const slot = findSlot(slotId);
  if (!slot) return;
  slot.students.push(val);
  input.value = '';
  saveData();
  render();
  openPanels.add(slotId);
  setTimeout(() => {
    const panel = document.getElementById(`panel_${slotId}`);
    if (panel) panel.classList.add('open');
    const ni = document.getElementById(`newstu_${slotId}`);
    if (ni) ni.focus();
  }, 50);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['all','mwf','tts','wknd'][i]===tab);
  });
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

loadData();
</script>
